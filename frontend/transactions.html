<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker - Transactions</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <h1>Transactions</h1>
        <p id="user-label"></p>
      </div>

      <div class="topbar-actions">
        <a class="nav-link" href="/dashboard.html">Dashboard</a>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <section class="card">
      <h2>Create Account</h2>
      <p>No account yet? Create one here first, then add a transaction.</p>

      <form id="account-form">
        <input
          id="account-name"
          type="text"
          placeholder="Account name (e.g. TD Chequing)"
          required
        />

        <select id="account-type" required>
          <option value="">Select account type</option>
          <option value="chequing">Chequing</option>
          <option value="savings">Savings</option>
          <option value="credit">Credit</option>
          <option value="cash">Cash</option>
        </select>

        <button type="submit">Create Account</button>
      </form>

      <p id="account-message"></p>
    </section>

    <section class="card">
      <h2>Add Transaction</h2>

      <form id="transaction-form">
        <select id="account-id" required></select>

        <select id="category-type" required>
          <option value="">Select category type</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>

        <input
          id="category-name"
          type="text"
          placeholder="Category name (optional)"
        />

        <input
          id="amount"
          type="number"
          step="0.01"
          placeholder="Amount"
          required
        />

        <input
          id="description"
          type="text"
          placeholder="Description (optional)"
        />

        <input id="transaction-date" type="date" />

        <button type="submit">Add Transaction</button>
      </form>

      <p id="transaction-message"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>All Transactions</h2>
        <button id="refresh-btn" type="button">Refresh</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Account</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="transactions-body"></tbody>
      </table>

      <p id="transactions-message"></p>
    </section>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="js/transactions/page.js"></script>
</body>
</html>
