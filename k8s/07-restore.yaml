apiVersion: batch/v1
kind: Job
metadata:
  name: db-restore
  namespace: finance-tracker
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: restore
          image: registry.digitalocean.com/finance-tracker-registry/pg-backup:latest
          command: ["/scripts/restore.sh"]

          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DB_USER

            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DB_PASSWORD

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: finance-tracker-config
                  key: DB_NAME

            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: spaces-secret
                  key: AWS_ACCESS_KEY_ID

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: spaces-secret
                  key: AWS_SECRET_ACCESS_KEY